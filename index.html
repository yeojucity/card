<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>구성모 | 여주시청 환경과</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --red:#C8102E;
    --gold:#B8925A;
    --ink:#1A1A1A;
    --slate:#4A4A4A;
    --hair:#E7E5E2;
    --paper:#FFFFFF;
    --stage:#EFEDE9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    background:var(--stage);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:28px 16px;
  }
  .card{
    width:100%;
    max-width:680px;
    background:var(--paper);
    border:1px solid var(--hair);
    border-radius:14px;
    box-shadow:0 1px 2px rgba(0,0,0,0.04), 0 16px 40px rgba(0,0,0,0.08);
    padding:36px;
    display:grid;
    grid-template-columns:1fr 1.35fr;
    gap:8px 36px;
  }
  .left{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border-right:1px solid var(--hair);
    padding-right:28px;
  }
  .logo img{
    width:100%;
    max-width:220px;
    height:auto;
    display:block;
  }
  .brand-lower{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:10px;
    margin-top:24px;
  }
  .site-link{
    font-size:13px;
    color:var(--slate);
    text-decoration:none;
    word-break:break-all;
  }
  .site-link:active{color:var(--red);}
  .yt-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    text-decoration:none;
  }
  .yt-icon{
    width:52px;
    height:37px;
    border-radius:10px;
    background:var(--red);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .yt-icon svg{width:20px; height:20px;}
  .yt-label{
    font-size:10.5px;
    font-weight:700;
    color:var(--gold);
    letter-spacing:0.02em;
    white-space:nowrap;
  }

  .right{
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .role{
    font-size:13px;
    color:var(--slate);
    margin:0 0 6px;
    font-weight:500;
  }
  .name{
    font-size:28px;
    font-weight:800;
    letter-spacing:0.28em;
    margin:0 0 18px;
    color:var(--ink);
  }
  .dept{
    font-size:14.5px;
    font-weight:700;
    margin:0 0 4px;
  }
  .addr{
    font-size:12.5px;
    color:var(--slate);
    margin:0 0 18px;
    line-height:1.5;
  }
  .contact{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .contact-row{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    background:none;
    border:none;
    padding:9px 6px;
    text-align:left;
    cursor:pointer;
    border-radius:8px;
    transition:background 0.15s ease;
    font-family:inherit;
  }
  .contact-row:active{background:#F5F3F0;}
  .tag{
    flex:0 0 16px;
    font-size:14px;
    font-weight:800;
    color:var(--red);
  }
  .tag.f{color:var(--slate);}
  .contact-row .val{
    font-size:15px;
    color:var(--ink);
    font-weight:500;
  }

  .save-wrap{
    grid-column:1 / -1;
    border-top:1px solid var(--hair);
    margin-top:22px;
    padding-top:20px;
  }
  .save-btn{
    width:100%;
    padding:15px;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .save-btn:active{background:#a80d26;}

  /* Mobile: stack like the printed card would if folded */
  @media (max-width:600px){
    .card{
      grid-template-columns:1fr;
      padding:28px 22px;
      gap:0;
    }
    .left{
      border-right:none;
      border-bottom:1px solid var(--hair);
      padding-right:0;
      padding-bottom:24px;
      margin-bottom:24px;
    }
    .logo img{max-width:190px;}
    .name{font-size:26px;}
  }

  /* Bottom sheet */
  .sheet-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.35);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
    z-index:10;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed;
    left:0; right:0; bottom:0;
    background:#fff;
    border-radius:20px 20px 0 0;
    padding:10px 16px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(110%);
    transition:transform 0.25s cubic-bezier(.32,.72,0,1);
    z-index:11;
    max-width:420px;
    margin:0 auto;
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{
    width:36px; height:4px;
    background:#DEDBD6;
    border-radius:2px;
    margin:6px auto 14px;
  }
  .sheet-title{
    font-size:13px;
    color:var(--slate);
    text-align:center;
    margin:0 0 14px;
  }
  .sheet-option{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:16px 14px;
    background:none;
    border:none;
    border-top:1px solid var(--hair);
    font-family:inherit;
    font-size:16px;
    font-weight:600;
    color:var(--ink);
    text-decoration:none;
    cursor:pointer;
  }
  .sheet-option:first-of-type{border-top:none;}
  .sheet-icon{flex:0 0 26px; text-align:center; font-size:17px;}
  .sheet-cancel{
    width:100%;
    margin-top:12px;
    padding:15px;
    background:#F5F3F0;
    border:none;
    border-radius:12px;
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    color:var(--slate);
    cursor:pointer;
  }
  .toast{
    position:fixed;
    left:50%; bottom:28px;
    transform:translate(-50%, 20px);
    background:var(--ink);
    color:#fff;
    padding:11px 18px;
    border-radius:10px;
    font-size:13.5px;
    opacity:0;
    transition:opacity 0.2s ease, transform 0.2s ease;
    pointer-events:none;
    z-index:20;
    white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translate(-50%, 0);}
</style>
</head>
<body>

<div class="card">
  <div class="left">
    <div class="logo">
      <img src="yeoju-logo.png" alt="여주시 CITY OF YEOJU">
    </div>
    <div class="brand-lower">
      <a class="site-link" href="https://www.yeoju.go.kr" target="_blank" rel="noopener">www.yeoju.go.kr</a>
      <a class="yt-block" href="https://www.youtube.com/channel/UCuU67w_4-KXWP4r_hJ_8hfA" target="_blank" rel="noopener">
        <span class="yt-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 6L18 12L8 18V6Z" fill="white"/></svg>
        </span>
        <span class="yt-label">여주시 유튜브</span>
      </a>
    </div>
  </div>

  <div class="right">
    <p class="role">주무관</p>
    <h1 class="name">구성모</h1>
    <p class="dept">여주시청 환경과</p>
    <p class="addr">12619 경기도 여주시 세종로 1</p>

    <div class="contact">
      <button class="contact-row" id="rowPhone">
        <span class="tag">T</span>
        <span class="val">031-887-2983</span>
      </button>
      <button class="contact-row" id="rowFax">
        <span class="tag f">F</span>
        <span class="val">031-887-2477</span>
      </button>
      <a class="contact-row" href="mailto:jiminsfa7511@korea.kr" id="rowEmail">
        <span class="tag">E</span>
        <span class="val">jiminsfa7511@korea.kr</span>
      </a>
    </div>
  </div>

  <div class="save-wrap">
    <button class="save-btn" id="saveContact">연락처 저장</button>
  </div>
</div>

<!-- Phone action sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <p class="sheet-title">031-887-2983</p>
  <a class="sheet-option" href="tel:031-887-2983">
    <span class="sheet-icon">📞</span> 전화 걸기
  </a>
  <a class="sheet-option" href="sms:031-887-2983">
    <span class="sheet-icon">💬</span> 문자 보내기
  </a>
  <button class="sheet-cancel" id="sheetCancel">취소</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const backdrop = document.getElementById('backdrop');
  const sheet = document.getElementById('sheet');
  const toast = document.getElementById('toast');

  function openSheet(){
    backdrop.classList.add('open');
    sheet.classList.add('open');
  }
  function closeSheet(){
    backdrop.classList.remove('open');
    sheet.classList.remove('open');
  }
  document.getElementById('rowPhone').addEventListener('click', openSheet);
  backdrop.addEventListener('click', closeSheet);
  document.getElementById('sheetCancel').addEventListener('click', closeSheet);

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=> toast.classList.remove('show'), 1800);
  }

  document.getElementById('rowFax').addEventListener('click', ()=>{
    const num = '031-887-2477';
    if(navigator.clipboard){
      navigator.clipboard.writeText(num).then(()=> showToast('팩스번호가 복사되었습니다'));
    } else {
      showToast(num);
    }
  });

  document.getElementById('saveContact').addEventListener('click', ()=>{
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:구성모;;;;',
      'FN:구성모',
      'ORG:여주시청;환경과',
      'TITLE:주무관',
      'TEL;TYPE=WORK,VOICE:031-887-2983',
      'TEL;TYPE=WORK,FAX:031-887-2477',
      'EMAIL;TYPE=WORK:jiminsfa7511@korea.kr',
      'ADR;TYPE=WORK:;;세종로 1;여주시;경기도;12619;대한민국',
      'URL:https://www.yeoju.go.kr',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '구성모_여주시청환경과.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
</script>

</body>
</html>
